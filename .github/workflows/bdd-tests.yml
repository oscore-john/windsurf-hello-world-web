name: BDD Living Documentation

on:
  deployment_status:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL to test against'
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  bdd-tests:
    # Run on successful Vercel deployments, pushes to main, or manual trigger
    # Excludes GitHub Pages deployment_status events (which carry a non-app URL)
    if: >-
      (github.event_name == 'deployment_status' &&
       github.event.deployment_status.state == 'success' &&
       github.event.deployment_status.environment != 'github-pages') ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Determine base URL
        id: url
        run: |
          if [ "${{ github.event_name }}" = "deployment_status" ]; then
            echo "base_url=${{ github.event.deployment_status.target_url }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "base_url=${{ inputs.base_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=https://windsurf-hello-world-web.vercel.app" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate BDD test files
        run: npx bddgen

      - name: Run BDD tests
        env:
          BASE_URL: ${{ steps.url.outputs.base_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npx playwright test

      - name: Upload living documentation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: living-documentation
          path: cucumber-report/
          retention-days: 30

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  deploy-docs:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: bdd-tests
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download living documentation
        uses: actions/download-artifact@v4
        with:
          name: living-documentation
          path: docs

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
